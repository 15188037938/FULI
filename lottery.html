<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>幸运转盘</title><link rel="stylesheet" href="style.css">
<style>.wheel-container{position:relative;width:340px;height:340px;margin:0 auto}#wheelCanvas{display:block;width:100%;height:100%}.pointer-outer{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:3}.pointer-inner{width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid #fbbf24;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}.center-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;z-index:2;border:4px solid var(--bg);box-shadow:0 4px 20px rgba(99,102,241,.4);line-height:1.2;text-align:center}.center-btn:hover{transform:translate(-50%,-50%) scale(1.05)}.center-btn.spinning{opacity:.7}.result-card{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin-top:16px}.result-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;font-weight:700}.cost-tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}.cost-tag.free{background:rgba(34,197,94,.15);color:var(--success)}.cost-tag.paid{background:rgba(245,158,11,.15);color:var(--warning)}</style></head><body>
<div class="bg-particles"></div><div class="toast-container" id="toastContainer"></div>
<div class="container"><div class="header"><h1>幸运转盘</h1><p>转动转盘，赢取积分</p></div>
<div id="lotteryNotice" class="card hidden" style="text-align:center;padding:12px 16px;margin-bottom:16px;background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.2)"><div id="lotteryNoticeText" style="font-size:13px;line-height:1.8;white-space:pre-wrap"></div></div>
<div class="stats-row"><div class="stat-item"><div class="stat-value" style="color:var(--warning)" id="freeDraws">0</div><div class="stat-label">免费次数</div></div><div class="stat-item"><div class="stat-value" style="color:var(--primary-light)" id="myPoints">0</div><div class="stat-label">积分余额<button class="btn btn-sm" style="padding:2px 10px;font-size:11px;margin-left:6px;background:rgba(99,102,241,.15);color:var(--primary-light);border:1px solid var(--primary);border-radius:12px;cursor:pointer" onclick="showRecharge()">充值</button></div></div></div>
<div class="wheel-container"><div class="pointer-outer"><div class="pointer-inner"></div></div><canvas id="wheelCanvas" width="680" height="680"></canvas><div class="center-btn" id="spinBtn" onclick="spin()">抽奖</div></div>
<div style="text-align:center;padding:10px;font-size:13px;color:var(--text-muted);margin-top:8px"><span class="cost-tag free">免费</span> 优先免费次数，无则消耗 <b style="color:var(--primary-light)">1积分</b>/次</div>
<div id="resultArea" class="hidden"><div class="result-card" id="resultCard"></div></div>
<a href="index.html" class="btn btn-outline btn-sm back-btn" style="text-decoration:none" title="返回首页"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>返回</a></div>

<script src="api-client.js"></script>
<script>
const FP=(()=>{const p=[navigator.platform||'',screen.width+'x'+screen.height+'x'+screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.language||''];return'fp_'+btoa(p.join('|')).slice(0,24).replace(/[^a-zA-Z0-9]/g,'');})();
function toast(m,t='info'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toastContainer').appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2500)}

const DEFAULTS=[{id:0,name:'100积分',weight:1,color:'#f43f5e',dotColor:'#fecdd3',points:100},{id:1,name:'70积分',weight:1,color:'#f97316',dotColor:'#fed7aa',points:70},{id:2,name:'50积分',weight:2,color:'#eab308',dotColor:'#fef08a',points:50},{id:3,name:'20积分',weight:3,color:'#22c55e',dotColor:'#bbf7d0',points:20},{id:4,name:'10积分',weight:5,color:'#14b8a6',dotColor:'#99f6e4',points:10},{id:5,name:'5积分',weight:8,color:'#3b82f6',dotColor:'#bfdbfe',points:5},{id:6,name:'1积分',weight:60,color:'#8b5cf6',dotColor:'#ddd6fe',points:1},{id:7,name:'谢谢参与',weight:20,color:'#6b7280',dotColor:'#d1d5db',points:0}];
let prizes=DEFAULTS;
const canvas=document.getElementById('wheelCanvas'),ctx=canvas.getContext('2d'),W=680,H=680,cx=W/2,cy=H/2,radius=300,segAngle=2*Math.PI/8,pointerAngle=-Math.PI/2;let currentAngle=0,spinning=false;

async function getPrizes(){const base=JSON.parse(JSON.stringify(DEFAULTS)),saved=await API.getPrizeConfig();if(saved&&Array.isArray(saved))saved.forEach(sp=>{const m=base.find(b=>b.id===sp.id||b.name===sp.name);if(m){m.weight=sp.weight;if(sp.name)m.name=sp.name;if(sp.points!==undefined)m.points=sp.points}});const tw=base.reduce((s,p)=>s+p.weight,0);return base.map(p=>({...p,prob:tw>0?p.weight/tw:0}))}

function drawWheel(r=0){ctx.clearRect(0,0,W,H);ctx.beginPath();ctx.arc(cx,cy,radius+10,0,2*Math.PI);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();for(let i=0;i<prizes.length;i++){const s=r+i*segAngle,e=s+segAngle;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,radius,s,e);ctx.closePath();const g=ctx.createLinearGradient(cx+Math.cos(s)*radius,cy+Math.sin(s)*radius,cx+Math.cos(e)*radius,cy+Math.sin(e)*radius);g.addColorStop(0,prizes[i].color);g.addColorStop(1,prizes[i].dotColor);ctx.fillStyle=g;ctx.fill();ctx.save();ctx.translate(cx,cy);ctx.rotate(s+segAngle/2);ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 22px -apple-system,"Microsoft YaHei",sans-serif';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;ctx.fillText(prizes[i].name,radius*.68,10);ctx.restore()}ctx.beginPath();ctx.arc(cx,cy,40,0,2*Math.PI);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.strokeStyle='#6366f1';ctx.lineWidth=3;ctx.stroke()}
function pickPrize(){const r=Math.random();let c=0;for(let i=0;i<prizes.length;i++){c+=prizes[i].prob;if(r<c)return i}return 7}

async function spin(){if(spinning)return;const p=await API.getPoints(FP);let costFree=false,drawPts=p;
if((p.free_draws||0)>0){costFree=true}else if(p.balance>=1){}else{toast('积分不足！请先签到获免费次数或充值','error');return}
spinning=true;document.getElementById('spinBtn').classList.add('spinning');document.getElementById('spinBtn').innerHTML='...';document.getElementById('resultArea').classList.add('hidden');
const idx=pickPrize(),prize=prizes[idx];
const result=await API.draw(FP,prize.name,costFree);
if(!result.ok){toast('抽奖失败','error');spinning=false;document.getElementById('spinBtn').classList.remove('spinning');updateSpinBtn();return}
// animate
const targetRaw=pointerAngle-idx*segAngle-segAngle/2,offset=(Math.random()-.5)*segAngle*.7,targetAngle=currentAngle+5*2*Math.PI+((targetRaw-currentAngle)%(2*Math.PI)+offset);
const startAngle=currentAngle,totalDelta=targetAngle-startAngle,startTime=performance.now();
function anim(now){const prog=Math.min((now-startTime)/4000,1),eased=1-Math.pow(1-prog,3);currentAngle=startAngle+totalDelta*eased;drawWheel(currentAngle);if(prog<1)requestAnimationFrame(anim);else{currentAngle=targetAngle%(2*Math.PI);spinning=false;document.getElementById('spinBtn').classList.remove('spinning');updateSpinBtn();onComplete(idx,costFree,result.code)}}
requestAnimationFrame(anim)}

function onComplete(idx,costFree,code){const p=prizes[idx],win=idx!==7;document.getElementById('resultArea').classList.remove('hidden');document.getElementById('resultCard').innerHTML=`<div class="result-icon" style="background:${win?'rgba(34,197,94,.15)':'rgba(107,114,128,.15)'};color:${p.color}">${win?'WIN':'-_-'}</div><div class="result-info" style="flex:1"><div style="font-size:16px;font-weight:600;color:${win?'var(--success)':'var(--text-muted)'}">${p.name}<span class="badge ${costFree?'badge-success':'badge-warning'}" style="margin-left:6px">${costFree?'免':'-1积分'}</span></div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">${win?(code?'兑换码已发放。请去福利大厅充值':'兑换码耗尽，请联系管理员补发'):'再接再厉！'}</div>${code?`<div style="margin-top:6px;font-size:11px;color:var(--primary-light);font-family:monospace">${code}</div>`:''}</div>`;refresh()}

async function refresh(){const p=await API.getPoints(FP);document.getElementById('freeDraws').textContent=p.free_draws||0;document.getElementById('myPoints').textContent=p.balance||0}
async function updateSpinBtn(){const p=await API.getPoints(FP);const b=document.getElementById('spinBtn');if((p.free_draws||0)>0){b.innerHTML='抽奖<span style="font-size:10px;display:block">免费</span>';b.style.opacity='1'}else if(p.balance>=1){b.innerHTML='抽奖<span style="font-size:10px;display:block">1积分</span>';b.style.opacity='1'}else{b.innerHTML='积分不足';b.style.opacity='0.5'}}

async function showRecharge(){const cfg=await API.getConfig();if(cfg.rechargeEnabled===false){toast('充值通道暂时关闭，请联系管理员QQ：9200563或加入Q群：722357283','info');return}
document.querySelector('.modal-overlay')?.remove();const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal"><h3>充值兑换</h3><p class="text-muted text-center mb-8">输入兑换码</p><div class="form-group"><input type="text" class="input" id="rcInput" placeholder="请输入兑换码" autofocus style="text-align:center;font-size:16px;letter-spacing:2px"></div><div id="rcResult" class="hidden" style="text-align:center;padding:8px;border-radius:var(--radius-sm);margin-bottom:12px"></div><div class="modal-actions"><button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">取消</button><button class="btn btn-primary" onclick="doRecharge()">确认</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});setTimeout(()=>document.getElementById('rcInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRecharge()}),100)}

async function doRecharge(){const c=document.getElementById('rcInput')?.value?.trim().toUpperCase(),r=document.getElementById('rcResult');if(!c)return;const res=await API.recharge(FP,c);if(res.ok){r.style.cssText='background:rgba(34,197,94,.1);color:var(--success)';r.innerHTML=`成功兑换 <b>${res.points}积分</b>（${res.name}）`;refresh()}else{r.style.cssText='background:rgba(239,68,68,.1);color:var(--danger)';r.textContent='无效兑换码'}r.classList.remove('hidden')}

(async function init(){prizes=await getPrizes();drawWheel(0);refresh();updateSpinBtn();const n=await API.getLotteryNotice();if(n){const el=document.getElementById('lotteryNotice');el.classList.remove('hidden');document.getElementById('lotteryNoticeText').textContent=n}})()
</script></body></html>
