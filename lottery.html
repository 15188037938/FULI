<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸运转盘</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
<style>
  .wheel-container { position:relative; width:340px; height:340px; margin:0 auto; }
  #wheelCanvas { display:block; width:100%; height:100%; }
  .pointer-outer { position:absolute; top:-18px; left:50%; transform:translateX(-50%); z-index:3; }
  .pointer-inner { width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent; border-top:32px solid #fbbf24; filter:drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
  .center-btn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg, var(--primary), var(--primary-dark)); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; cursor:pointer; z-index:2; border:4px solid var(--bg); box-shadow:0 4px 20px rgba(99,102,241,.4); transition:transform .15s; user-select:none; line-height:1.2; text-align:center; }
  .center-btn:hover { transform:translate(-50%,-50%) scale(1.05); }
  .center-btn:active { transform:translate(-50%,-50%) scale(.95); }
  .center-btn.spinning { cursor:not-allowed; opacity:.7; }
  .result-card { display:flex; align-items:center; gap:12px; padding:16px 20px; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); margin-top:16px; animation:fadeIn .3s ease; }
  .result-card .result-icon { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; font-weight:700; }
  .result-card .result-info { flex:1; }
  .result-card .result-name { font-size:16px; font-weight:600; }
  .result-card .result-desc { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .cost-tag { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .cost-tag.free { background:rgba(34,197,94,.15); color:var(--success); }
  .cost-tag.paid { background:rgba(245,158,11,.15); color:var(--warning); }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div class="bg-particles"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="header"><h1>幸运转盘</h1><p>转动转盘，赢取积分</p></div>
  <div id="lotteryNotice" class="card hidden" style="text-align:center;padding:12px 16px;margin-bottom:16px;background:rgba(99,102,241,.05);border-color:rgba(99,102,241,.2);"><div id="lotteryNoticeText" style="font-size:13px;line-height:1.8;white-space:pre-wrap;"></div></div>

  <div class="stats-row">
    <div class="stat-item"><div class="stat-value" style="color:var(--warning);" id="freeDraws">0</div><div class="stat-label">免费次数</div></div>
    <div class="stat-item"><div class="stat-value" style="color:var(--primary-light);" id="myPoints">0</div><div class="stat-label">积分余额<button class="btn btn-sm" id="rechargeBtn" style="padding:2px 10px;font-size:11px;margin-left:6px;background:rgba(99,102,241,.15);color:var(--primary-light);border:1px solid var(--primary);border-radius:12px;cursor:pointer;" onclick="showRechargeModal()">充值</button></div></div>
  </div>

  <div class="wheel-container" id="wheelContainer">
    <div class="pointer-outer"><div class="pointer-inner"></div></div>
    <canvas id="wheelCanvas" width="680" height="680"></canvas>
    <div class="center-btn" id="spinBtn" onclick="spin()">抽奖</div>
  </div>
  <div class="cost-indicator" id="costHint" style="text-align:center;padding:10px;font-size:13px;color:var(--text-muted);margin-top:8px;">
    <span class="cost-tag free">免费</span> 优先使用免费次数，无免费次数消耗 <span style="color:var(--primary-light);font-weight:600;">1 积分</span>/次
  </div>
  <div id="resultArea" class="hidden"><div class="result-card" id="resultCard"></div></div>

  <a href="index.html" class="btn btn-outline btn-sm back-btn" style="text-decoration:none;" title="返回首页">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>返回
  </a>
</div>

<script>
const FINGERPRINT = (() => { const p=[navigator.platform||'',screen.width+'x'+screen.height+'x'+screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.language||'']; return 'fp_'+btoa(p.join('|')).slice(0,24).replace(/[^a-zA-Z0-9]/g,''); })();
function toast(m,t='info'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toastContainer').appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2500);}

const DEFAULT_PRIZES = [
  {id:0,name:'100积分',weight:1,color:'#f43f5e',dotColor:'#fecdd3',points:100},
  {id:1,name:'70积分',weight:1,color:'#f97316',dotColor:'#fed7aa',points:70},
  {id:2,name:'50积分',weight:2,color:'#eab308',dotColor:'#fef08a',points:50},
  {id:3,name:'20积分',weight:3,color:'#22c55e',dotColor:'#bbf7d0',points:20},
  {id:4,name:'10积分',weight:5,color:'#14b8a6',dotColor:'#99f6e4',points:10},
  {id:5,name:'5积分',weight:8,color:'#3b82f6',dotColor:'#bfdbfe',points:5},
  {id:6,name:'1积分',weight:60,color:'#8b5cf6',dotColor:'#ddd6fe',points:1},
  {id:7,name:'谢谢参与',weight:20,color:'#6b7280',dotColor:'#d1d5db',points:0}
];

async function getPrizes() {
  const base = JSON.parse(JSON.stringify(DEFAULT_PRIZES));
  const saved = await DB.getPrizeConfig();
  if (saved && Array.isArray(saved)) saved.forEach(sp => { const m=base.find(b=>b.id===sp.id||b.name===sp.name); if(m){m.weight=sp.weight; if(sp.name)m.name=sp.name; if(sp.points!==undefined)m.points=sp.points;} });
  const tw = base.reduce((s,p)=>s+p.weight,0);
  return base.map(p=>({...p,prob:tw>0?p.weight/tw:0}));
}

let prizes = DEFAULT_PRIZES;
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const W=680,H=680,cx=W/2,cy=H/2,radius=300,segAngle=2*Math.PI/8,pointerAngle=-Math.PI/2;
let currentAngle=0,spinning=false;

function drawWheel(rotation=0) {
  ctx.clearRect(0,0,W,H);
  ctx.beginPath();ctx.arc(cx,cy,radius+10,0,2*Math.PI);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
  for(let i=0;i<prizes.length;i++){const s=rotation+i*segAngle,e=s+segAngle;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,radius,s,e);ctx.closePath();const ma=s+segAngle/2;const g=ctx.createLinearGradient(cx+Math.cos(s)*radius,cy+Math.sin(s)*radius,cx+Math.cos(e)*radius,cy+Math.sin(e)*radius);g.addColorStop(0,prizes[i].color);g.addColorStop(1,prizes[i].dotColor);ctx.fillStyle=g;ctx.fill();ctx.save();ctx.translate(cx,cy);ctx.rotate(ma);ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 22px -apple-system,"Microsoft YaHei",sans-serif';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4;ctx.fillText(prizes[i].name,radius*.68,10);ctx.restore();}
  ctx.beginPath();ctx.arc(cx,cy,40,0,2*Math.PI);ctx.fillStyle='#1a1a2e';ctx.fill();ctx.strokeStyle='#6366f1';ctx.lineWidth=3;ctx.stroke();
  for(let i=0;i<8;i++){const a=i*Math.PI/4;ctx.beginPath();ctx.arc(cx+Math.cos(a)*(radius-10),cy+Math.sin(a)*(radius-10),6,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();}
}

function pickPrize(){const r=Math.random();let c=0;for(let i=0;i<prizes.length;i++){c+=prizes[i].prob;if(r<c)return i;}return prizes.length-1;}

async function spin() {
  if(spinning)return;
  const pts = await DB.getUserPoints(FINGERPRINT);
  let costFree=false;
  if((pts.free_draws||0)>0){costFree=true;await DB.updateUserPoints(FINGERPRINT,pts.balance,pts.free_draws-1);}
  else if(pts.balance>=1){await DB.updateUserPoints(FINGERPRINT,pts.balance-1,pts.free_draws);}
  else{toast('积分不足！请先签到获取免费次数或充值积分','error');return;}
  updateStats();spinning=true;
  document.getElementById('spinBtn').classList.add('spinning');document.getElementById('spinBtn').innerHTML='...';
  document.getElementById('resultArea').classList.add('hidden');
  const idx=pickPrize(),prize=prizes[idx],targetRaw=pointerAngle-idx*segAngle-segAngle/2,offset=(Math.random()-.5)*segAngle*.7,fullSpins=5*2*Math.PI,targetAngle=currentAngle+fullSpins+((targetRaw-currentAngle)%(2*Math.PI)+offset);
  const startAngle=currentAngle,totalDelta=targetAngle-startAngle,duration=4000,startTime=performance.now();
  function animate(now){const p=Math.min((now-startTime)/duration,1),eased=1-Math.pow(1-p,3);currentAngle=startAngle+totalDelta*eased;drawWheel(currentAngle);if(p<1)requestAnimationFrame(animate);else{currentAngle=targetAngle%(2*Math.PI);spinning=false;document.getElementById('spinBtn').classList.remove('spinning');updateSpinBtn();onComplete(idx,costFree);}}
  requestAnimationFrame(animate);
}

async function onComplete(idx,costFree){
  const prize=prizes[idx],isWin=idx!==prizes.length-1;let codeStr='';
  if(isWin&&prize.points>0){const ac=await DB.getAvailablePrizeCode(prize.name);if(ac){await DB.usePrizeCode(ac.id,FINGERPRINT);codeStr=ac.code;}else{toast('兑换码耗尽，请联系管理员补发，QQ：9200563','error');}}
  await DB.addDrawRecord({user_id:FINGERPRINT,prize:prize.name,points:prize.points,code:codeStr||null,cost_free:costFree});
  document.getElementById('resultArea').classList.remove('hidden');
  const card=document.getElementById('resultCard'),costLabel=costFree?'<span class="badge badge-success" style="margin-left:6px;">免</span>':'<span class="badge badge-warning" style="margin-left:6px;">-1积分</span>';
  card.innerHTML=`<div class="result-icon" style="background:${isWin?'rgba(34,197,94,.15)':'rgba(107,114,128,.15)'};color:${prize.color};">${isWin?'WIN':'-_-'}</div><div class="result-info"><div class="result-name" style="color:${isWin?'var(--success)':'var(--text-muted)'}">${prize.name}${costLabel}</div><div class="result-desc">${isWin?'恭喜中奖！'+(codeStr?'兑换码已发放。':'')+'请去福利大厅充值兑换积分':'再接再厉！'}</div>${codeStr?`<div style="margin-top:6px;font-size:11px;color:var(--primary-light);font-family:monospace;">兑换码: ${codeStr}</div>`:''}</div>`;
}

async function updateStats(){const pts=await DB.getUserPoints(FINGERPRINT);document.getElementById('freeDraws').textContent=pts.free_draws||0;document.getElementById('myPoints').textContent=pts.balance||0;}
async function updateSpinBtn(){const pts=await DB.getUserPoints(FINGERPRINT);const btn=document.getElementById('spinBtn');if((pts.free_draws||0)>0){btn.innerHTML='抽奖<span style="font-size:10px;display:block;">免费</span>';btn.style.opacity='1';}else if(pts.balance>=1){btn.innerHTML='抽奖<span style="font-size:10px;display:block;">1积分</span>';btn.style.opacity='1';}else{btn.innerHTML='抽奖<span style="font-size:10px;display:block;">积分不足</span>';btn.style.opacity='0.5';}}

async function showRechargeModal(){
  const config=await DB.getConfig();
  if(config.rechargeEnabled===false){toast('充值通道暂时关闭，如需充值，请联系管理员QQ：9200563或加入Q群：722357283','info');return;}
  document.querySelector('.modal-overlay')?.remove();const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3>充值兑换</h3><p class="text-muted text-center mb-8">输入兑换码，兑换相应积分</p><div class="form-group"><input type="text" class="input" id="redeemCodeInput" placeholder="请输入兑换码" autofocus style="text-align:center;font-size:16px;letter-spacing:2px;"></div><div id="redeemResult" class="hidden" style="text-align:center;padding:8px;border-radius:var(--radius-sm);margin-bottom:12px;"></div><div class="modal-actions"><button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">取消</button><button class="btn btn-primary" onclick="doRecharge()">确认兑换</button></div></div>`;
  document.body.appendChild(overlay);overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  setTimeout(()=>{document.getElementById('redeemCodeInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')doRecharge();});},100);
}

async function doRecharge(){
  const input=document.getElementById('redeemCodeInput'),code=input?.value?.trim().toUpperCase();if(!code)return;
  const resultEl=document.getElementById('redeemResult'),pc=await DB.findPrizeCodeByCode(code);
  if(pc&&!pc.used){await DB.usePrizeCode(pc.id,FINGERPRINT);const pts=await DB.getUserPoints(FINGERPRINT);await DB.updateUserPoints(FINGERPRINT,(pts.balance||0)+(pc.prize_points||0),pts.free_draws||0);updateStats();resultEl.className='';resultEl.style.cssText='background:rgba(34,197,94,.1);color:var(--success)';resultEl.innerHTML=`成功兑换 <strong>${pc.prize_points} 积分</strong>（${pc.prize_name}）`;resultEl.classList.remove('hidden');input.value='';return;}
  resultEl.className='';resultEl.style.cssText='background:rgba(239,68,68,.1);color:var(--danger)';resultEl.textContent=pc?'该兑换码已被使用':'无效的兑换码';resultEl.classList.remove('hidden');
}

(async function init(){
  prizes=await getPrizes();drawWheel(0);updateStats();updateSpinBtn();
  const notice=await DB.getLotteryNotice();if(notice){const el=document.getElementById('lotteryNotice');el.classList.remove('hidden');document.getElementById('lotteryNoticeText').textContent=notice;}
})();
</script>
</body>
</html>
