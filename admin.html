<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理员后台</title><link rel="stylesheet" href="style.css">
<style>.login-box{max-width:360px;margin:60px auto;text-align:center}.code-list-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}.code-list-item .code-val{font-family:"Courier New",monospace;color:var(--primary-light);font-weight:600}.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px}.prize-edit-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}.prize-edit-row .prize-dot{width:12px;height:12px;border-radius:50%}.prize-edit-row .prize-name-input{flex:1;padding:6px 8px;font-size:13px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);min-width:80px;max-width:140px}.prize-edit-row .prize-weight-input{width:64px;padding:6px 4px;text-align:center;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:14px}.prize-edit-row input:focus{outline:none;border-color:var(--primary)}.prize-edit-row .pct{width:48px;text-align:right;font-size:13px;font-weight:600;color:var(--primary-light)}.prize-total-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:14px;font-weight:600}.total-ok{color:var(--success)}.total-warn{color:var(--danger)}.prize-group{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}.prize-group-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);cursor:pointer}.prize-group-header:hover{background:rgba(99,102,241,.06)}.prize-group-header .group-arrow{transition:transform .2s;font-size:12px;color:var(--text-muted)}.prize-group-header.open .group-arrow{transform:rotate(90deg)}.prize-group-header .group-info{flex:1;margin:0 10px}.prize-group-body{display:none;border-top:1px solid var(--border);background:var(--bg)}.prize-group-body.show{display:block}.prize-group-body .code-row{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px}.code-val-sm{font-family:"Courier New",monospace;color:var(--primary-light);font-size:12px}.container.admin-view{max-width:860px}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.admin-grid .card{margin-top:0;margin-bottom:0}.admin-wide{grid-column:1/-1}</style></head><body>
<div class="bg-particles"></div><div class="toast-container" id="toastContainer"></div><div id="app"></div>

<script src="api-client.js"></script>
<script>
const DEFAULTS=[{id:0,name:'100积分',weight:1,color:'#f43f5e'},{id:1,name:'70积分',weight:1,color:'#f97316'},{id:2,name:'50积分',weight:2,color:'#eab308'},{id:3,name:'20积分',weight:3,color:'#22c55e'},{id:4,name:'10积分',weight:5,color:'#14b8a6'},{id:5,name:'5积分',weight:8,color:'#3b82f6'},{id:6,name:'1积分',weight:60,color:'#8b5cf6'},{id:7,name:'谢谢参与',weight:20,color:'#6b7280'}];
function toast(m,t='info'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toastContainer').appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2500)}

let state='login',config={},prizes=[],prizeCodes=[],totalSignin=0,links=[],lotteryNotice='';

async function loadData(){config=await API.getConfig();prizes=(await API.getPrizeConfig())||JSON.parse(JSON.stringify(DEFAULTS));prizeCodes=await API.getPrizeCodes();links=await API.getLinks();totalSignin=await API.getTotalSigninUsers();lotteryNotice=await API.getLotteryNotice()}

function render(){document.getElementById('app').innerHTML=state==='login'?loginHtml():adminHtml()}

function loginHtml(){return`<div class="login-box"><div class="header"><h1>管理员后台</h1><p>请输入管理员密码</p></div><div class="card"><div class="form-group"><label>管理员密码</label><input type="password" class="input" id="loginPwd" placeholder="请输入密码" autofocus onkeydown="if(event.key==='Enter')doLogin()"></div><button class="btn btn-primary btn-block mt-8" onclick="doLogin()">登录</button></div></div><a href="index.html" class="btn btn-outline btn-sm back-btn" style="text-decoration:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>返回</a>`}

async function doLogin(){const pwd=document.getElementById('loginPwd').value.trim();if(pwd===(config.adminPassword||'admin123')){localStorage.setItem('sl_admin_session',JSON.stringify({loggedAt:Date.now()}));state='admin';await loadData();render();toast('登录成功','success')}else{toast('密码错误','error')}}

function adminHtml(){const tw=prizes.reduce((s,p)=>s+p.weight,0),unused=prizeCodes.filter(c=>!c.used);
const groups={};unused.forEach(c=>{if(!groups[c.prize_name])groups[c.prize_name]=[];groups[c.prize_name].push(c)});
const on=prizes.map(p=>p.name).filter(n=>groups[n]);
const prizeRows=prizes.map((p,i)=>`<div class="prize-edit-row"><div class="prize-dot" style="background:${p.color}"></div><input type="text" class="prize-name-input" data-idx="${i}" value="${p.name}" oninput="onWChange()"><input type="number" class="prize-weight-input" data-idx="${i}" value="${p.weight}" min="0" max="9999" oninput="onWChange()"><span class="pct" id="pct${i}">${tw>0?(p.weight/tw*100).toFixed(0):0}%</span></div>`).join('');
const groupsHtml=on.map((name,gi)=>`<div class="prize-group"><div class="prize-group-header" onclick="toggleG(${gi})" id="gh${gi}"><span class="group-arrow">▶</span><span class="group-info"><span class="group-name">${name}</span><span class="group-count"><strong>${groups[name].length}</strong> 张</span></span></div><div class="prize-group-body" id="gb${gi}">${groups[name].map(c=>`<div class="code-row"><span class="code-val-sm">${c.code}</span><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();delCode(${c.id})" style="padding:3px 8px;font-size:11px">删</button></div>`).join('')}</div></div>`).join('');

return`<div class="container admin-view"><div class="admin-header"><h2>管理面板</h2><button class="btn btn-outline btn-sm" onclick="doLogout()">退出登录</button></div>
<div class="stats-row admin-wide"><div class="stat-item"><div class="stat-value">${totalSignin}</div><div class="stat-label">总签到人数</div></div></div>
<div class="admin-grid">
<div class="card"><div class="card-title"><span class="icon purple"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg></span>签到设置</div><div class="form-group"><label>每次签到积分</label><input type="number" class="input" id="signinPoints" value="${config.signinPoints||5}" min="1" max="9999"></div><div class="form-group"><label>管理员密码</label><input type="text" class="input" id="adminPassword" value="${config.adminPassword||'admin123'}"></div><div class="form-group" style="display:flex;align-items:center;gap:10px"><label style="margin-bottom:0">充值功能</label><select class="input" id="rechargeEnabled" style="width:auto"><option value="1" ${config.rechargeEnabled!==false?'selected':''}>开启</option><option value="0" ${config.rechargeEnabled===false?'selected':''}>关闭</option></select></div><button class="btn btn-primary" onclick="saveCfg()">保存</button></div>
<div class="card"><div class="card-title"><span class="icon blue"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/></svg></span>抽奖页说明</div><div class="form-group"><label>说明文字</label><textarea class="textarea" id="lotteryNotice" rows="3">${lotteryNotice}</textarea></div><button class="btn btn-primary" onclick="saveNotice()">保存</button></div>
<div class="card"><div class="card-title"><span class="icon orange"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></span>抽奖概率</div><p class="text-muted mb-8">调整权重，自动换算%</p><div id="prizeEditor">${prizeRows}</div><div class="prize-total-row"><span>总权重: <span id="totalWeight">${tw}</span></span><span id="totalBadge" class="${tw===100?'total-ok':'total-warn'}">${tw===100?'=100%':tw+'总和'}</span></div><div class="flex gap-8 mt-8"><button class="btn btn-primary" onclick="savePrizes()">保存</button><button class="btn btn-outline btn-sm" onclick="resetPrizes()">恢复默认</button></div></div>
<div class="card"><div class="card-title"><span class="icon orange"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></span>奖品兑换码</div><div class="form-group"><label>奖品名称</label><select class="input" id="prizeCodeName">${prizes.filter(p=>p.name!=='谢谢参与').map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select></div><div class="form-group"><label>兑换码</label><input type="text" class="input" id="prizeCodeValue" placeholder="输入兑换码"></div><button class="btn btn-primary" onclick="addCode()">添加</button><button class="btn btn-outline btn-sm" onclick="showBatchModal()" style="margin-left:8px">批量添加</button><div class="section-title mt-20">列表<span class="text-muted" style="font-weight:400;margin-left:8px">共${unused.length}个可用</span></div>${groupsHtml||'<div class="empty-state"><p>暂无奖品兑换码</p></div>'}</div>
<div class="card"><div class="card-title"><span class="icon blue"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3"/></svg></span>自定义链接</div><div class="flex gap-8" style="align-items:flex-end"><div class="form-group" style="margin-bottom:0;flex:1"><label>名称</label><input type="text" class="input" id="linkName"></div><div class="form-group" style="margin-bottom:0;flex:2"><label>地址</label><input type="text" class="input" id="linkUrl"></div><button class="btn btn-primary" onclick="addLink()">添加</button></div><div class="section-title mt-20">列表<span class="text-muted" style="font-weight:400;margin-left:8px">共${links.length}个</span></div>${links.length?links.map(l=>`<div class="code-list-item"><span style="font-size:13px;font-weight:500">${l.name}</span><span style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px">${l.url}</span><button class="btn btn-danger btn-sm" onclick="delLink(${l.id})" style="padding:3px 8px;font-size:11px">删</button></div>`).join(''):'<div class="empty-state"><p>暂无</p></div>'}</div>
</div><a href="index.html" class="btn btn-outline btn-sm back-btn" style="text-decoration:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>返回</a></div>`}

function toggleG(i){const b=document.getElementById('gb'+i),h=document.getElementById('gh'+i);if(b&&h){b.classList.toggle('show');h.classList.toggle('open')}}

async function saveCfg(){config.signinPoints=parseInt(document.getElementById('signinPoints').value)||5;config.adminPassword=document.getElementById('adminPassword').value.trim()||'admin123';config.rechargeEnabled=document.getElementById('rechargeEnabled')?.value!=='0';await API.setConfig(config);toast('已保存','success')}
async function saveNotice(){const t=document.getElementById('lotteryNotice')?.value||'';await API.setLotteryNotice(t);toast('已保存','success')}

function onWChange(){const is=document.querySelectorAll('.prize-weight-input');let t=0;const ws=[];is.forEach(i=>{const w=parseInt(i.value)||0;ws.push(w);t+=w});document.getElementById('totalWeight').textContent=t;const b=document.getElementById('totalBadge');b.className=t===100?'total-ok':'total-warn';b.textContent=t===100?'=100%':t+'总和';is.forEach((i,j)=>{const el=document.getElementById('pct'+j);if(el)el.textContent=(t>0?(ws[j]/t*100):0).toFixed(0)+'%'})}

async function savePrizes(){const ns=document.querySelectorAll('.prize-name-input'),ws=document.querySelectorAll('.prize-weight-input');let t=0;ns.forEach((n,i)=>{const nm=n.value.trim(),w=parseInt(ws[i].value)||0;prizes[i].name=nm;prizes[i].weight=w;let pts=parseInt(nm);if(isNaN(pts))pts=prizes[i].points||0;prizes[i].points=pts;t+=w});if(t===0){toast('总权重不能为0','error');return}await API.setPrizeConfig(prizes);toast('已保存','success');await loadData();render()}
async function resetPrizes(){await API.setPrizeConfig(JSON.parse(JSON.stringify(DEFAULTS)));toast('已恢复','info');await loadData();render()}

async function addCode(){const n=document.getElementById('prizeCodeName')?.value,c=document.getElementById('prizeCodeValue')?.value?.trim();if(!c){toast('请输入兑换码','error');return}const p=prizes.find(x=>x.name===n);await API.addPrizeCodes([{id:Date.now(),code:c,prize_name:n,prize_points:p?.points||0,used:false}]);document.getElementById('prizeCodeValue').value='';toast('已添加','success');await loadData();render()}

function showBatchModal(){document.querySelector('.modal-overlay')?.remove();const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal"><h3>批量添加</h3><p class="text-muted text-center mb-8">一行一个兑换码，将关联到当前选择的奖品名称</p><textarea class="textarea" id="batchInput" rows="6"></textarea><div class="modal-actions mt-12"><button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">取消</button><button class="btn btn-primary" onclick="batchAdd()">添加</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()})}
async function batchAdd(){const t=document.getElementById('batchInput')?.value?.trim();if(!t){toast('请输入兑换码','error');return}const name=document.getElementById('prizeCodeName')?.value;const p=prizes.find(x=>x.name===name);if(!name||!p){toast('请先选择奖品名称','error');return}const batch=t.split('\n').filter(l=>l.trim()).map(line=>{const code=line.trim();return{id:Date.now()+Math.random(),code:code,prize_name:name,prize_points:p?.points||0,used:false}}).filter(x=>x.code);if(!batch.length){toast('格式错误','error');return}await API.addPrizeCodes(batch);toast(`已添加${batch.length}个`,'success');document.querySelector('.modal-overlay')?.remove();await loadData();render()}
async function delCode(id){await API.deletePrizeCode(id);toast('已删除','info');await loadData();render()}

async function addLink(){const n=document.getElementById('linkName')?.value?.trim(),u=document.getElementById('linkUrl')?.value?.trim();if(!n||!u){toast('请填写完整','error');return}await API.addLink(n,u);document.getElementById('linkName').value='';document.getElementById('linkUrl').value='';toast('已添加','success');await loadData();render()}
async function delLink(id){await API.deleteLink(id);toast('已删除','info');await loadData();render()}
function doLogout(){localStorage.removeItem('sl_admin_session');state='login';render();toast('已退出','info')}

(async function init(){config=await API.getConfig();const s=localStorage.getItem('sl_admin_session');if(s){try{const d=JSON.parse(s);if(Date.now()-d.loggedAt<3600000){state='admin';await loadData()}}catch{}}render();if(state==='admin'){const n=await API.getLotteryNotice();setTimeout(()=>{const el=document.getElementById('lotteryNotice');if(el&&n)el.value=n},200)}})()
</script></body></html>
