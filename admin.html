<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台</title>
<link rel="stylesheet" href="style.css">
<style>
  .login-box { max-width:360px; margin:60px auto; text-align:center; }
  .code-list-item {
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px;
  }
  .code-list-item .code-val {
    font-family:"Courier New",monospace;
    color:var(--primary-light); font-weight:600; letter-spacing:1px;
  }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:14px; }
  .empty-state svg { opacity:.3; margin-bottom:12px; }

  /* 奖品权重编辑 */
  .prize-edit-row {
    display:flex; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--border);
  }
  .prize-edit-row .prize-dot {
    width:12px; height:12px; border-radius:50%; flex-shrink:0;
  }
  .prize-edit-row .prize-name-input {
    flex:1; padding:6px 8px; text-align:left; font-size:13px; font-weight:500;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--bg); color:var(--text); font-family:inherit;
    min-width:80px; max-width:140px;
  }
  .prize-edit-row .prize-weight-input {
    width:64px; padding:6px 4px; text-align:center;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--bg); color:var(--text); font-size:14px;
    font-family:inherit;
  }
  .prize-edit-row input:focus { outline:none; border-color:var(--primary); }
  .prize-edit-row .pct {
    width:48px; text-align:right; font-size:13px;
    font-weight:600; color:var(--primary-light);
  }
  .prize-total-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 0; font-size:14px; font-weight:600;
  }
  .prize-total-row .total-ok { color:var(--success); }
  .prize-total-row .total-warn { color:var(--danger); }

  /* 奖品兑换码分组折叠 */
  .prize-group {
    border:1px solid var(--border); border-radius:var(--radius-sm);
    margin-bottom:8px; overflow:hidden;
  }
  .prize-group-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; background:var(--bg); cursor:pointer;
    user-select:none; transition:background var(--transition);
  }
  .prize-group-header:hover { background:rgba(99,102,241,.06); }
  .prize-group-header .group-arrow {
    transition:transform .2s; font-size:12px; color:var(--text-muted);
  }
  .prize-group-header.open .group-arrow { transform:rotate(90deg); }
  .prize-group-header .group-info { flex:1; margin:0 10px; }
  .prize-group-header .group-name { font-size:14px; font-weight:600; }
  .prize-group-header .group-count { font-size:12px; color:var(--text-muted); }
  .prize-group-header .group-count strong { color:var(--primary-light); }
  .prize-group-body {
    display:none; border-top:1px solid var(--border);
    background:var(--bg);
  }
  .prize-group-body.show { display:block; }
  .prize-group-body .code-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; border-bottom:1px solid var(--border); font-size:13px;
  }
  .prize-group-body .code-row:last-child { border-bottom:none; }
  .prize-group-body .code-val-sm {
    font-family:"Courier New",monospace;
    color:var(--primary-light); font-size:12px;
  }

  /* 管理后台两列布局 */
  .container.admin-view { max-width: 860px; }
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .admin-grid .card { margin-top: 0; margin-bottom: 0; }
  .admin-grid .mt-20 { margin-top: 0; }
  .admin-wide { grid-column: 1 / -1; }
</style>
</head>
<body>
<div class="bg-particles"></div>
<div class="toast-container" id="toastContainer"></div>

<div id="app"></div>

<script>
// ========== 数据管理 ==========
function SL(key, fallback) {
  try { const v = localStorage.getItem('sl_' + key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function SS(key, val) { localStorage.setItem('sl_' + key, JSON.stringify(val)); }

function getConfig() { return SL('config', { signinPoints: 5, adminPassword: 'admin123' }); }
const DEFAULT_PRIZES = [
  { id:0, name:'100积分', weight:1, color:'#f43f5e' },
  { id:1, name:'70积分',  weight:1, color:'#f97316' },
  { id:2, name:'50积分',  weight:2, color:'#eab308' },
  { id:3, name:'20积分',  weight:3, color:'#22c55e' },
  { id:4, name:'10积分',  weight:5, color:'#14b8a6' },
  { id:5, name:'5积分',   weight:8, color:'#3b82f6' },
  { id:6, name:'1积分',   weight:60, color:'#8b5cf6' },
  { id:7, name:'谢谢参与', weight:20, color:'#6b7280' },
];

function getPrizeConfig() {
  const saved = SL('prize_config', null);
  if (saved && Array.isArray(saved) && saved.length === 8) return saved;
  // 从旧的 lotteryPrizes 迁移
  const legacy = SL('lotteryPrizes', null);
  if (legacy && Array.isArray(legacy) && legacy.length === 8) return legacy;
  return JSON.parse(JSON.stringify(DEFAULT_PRIZES));
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2500);
}

// ========== 页面状态 ==========
let state = 'login';

function render() {
  const app = document.getElementById('app');
  if (state === 'login') {
    app.innerHTML = renderLogin();
  } else {
    app.innerHTML = renderAdmin();
  }
}

// ========== 登录页 ==========
function renderLogin() {
  return `
    <div class="login-box">
      <div class="header">
        <h1>管理员后台</h1>
        <p>请输入管理员密码</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label>管理员密码</label>
          <input type="password" class="input" id="loginPwd" placeholder="请输入密码" autofocus onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary btn-block mt-8" onclick="doLogin()">登录</button>
      </div>
    </div>
    <a href="index.html" class="btn btn-outline btn-sm back-btn" style="text-decoration:none;" title="返回首页">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </a>
  `;
}

function doLogin() {
  const pwd = document.getElementById('loginPwd').value.trim();
  const config = getConfig();
  if (pwd === config.adminPassword) {
    SS('admin_session', { loggedAt: Date.now() });
    state = 'admin';
    render();
    toast('登录成功', 'success');
  } else {
    toast('密码错误', 'error');
  }
}

// ========== 管理主界面 ==========
function renderAdmin() {
  const config = getConfig();
  const prizes = getPrizeConfig();
  const totalWeight = prizes.reduce((s,p) => s + p.weight, 0);
  // 统计签到用户数
  let signinUsers = new Set();
  Object.keys(localStorage)
    .filter(k => k.startsWith('sl_history_'))
    .forEach(k => {
      const uid = k.replace('sl_history_', '');
      const records = SL('history_' + uid, []);
      if (records.length > 0) signinUsers.add(uid);
    });
  const totalSigninUsers = signinUsers.size;

  const prizeRows = prizes.map((p, i) => `
    <div class="prize-edit-row">
      <div class="prize-dot" style="background:${p.color};"></div>
      <input type="text" class="prize-name-input" data-idx="${i}" value="${p.name}" oninput="onWeightChange()">
      <input type="number" class="prize-weight-input" data-idx="${i}" value="${p.weight}" min="0" max="9999" oninput="onWeightChange()">
      <span class="pct" id="pct${i}">${totalWeight>0 ? (p.weight/totalWeight*100).toFixed(0) : 0}%</span>
    </div>
  `).join('');

  return `
    <div class="container admin-view">
      <div class="admin-header">
        <h2>管理面板</h2>
        <button class="btn btn-outline btn-sm" onclick="doLogout()">退出登录</button>
      </div>

      <div class="stats-row admin-wide">
        <div class="stat-item">
          <div class="stat-value">${totalSigninUsers}</div>
          <div class="stat-label">总签到人数</div>
        </div>
      </div>

      <div class="admin-grid">

      <!-- 签到设置 -->
      <div class="card">
        <div class="card-title">
          <span class="icon purple">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
          签到设置
        </div>
        <div class="form-group">
          <label>每次签到积分</label>
          <input type="number" class="input" id="signinPoints" value="${config.signinPoints}" min="1" max="9999">
        </div>
        <div class="form-group">
          <label>管理员密码</label>
          <input type="text" class="input" id="adminPassword" value="${config.adminPassword}">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
          <label style="margin-bottom:0;">充值功能</label>
          <select class="input" id="rechargeEnabled" style="width:auto;">
            <option value="1" ${config.rechargeEnabled !== false ? 'selected' : ''}>开启</option>
            <option value="0" ${config.rechargeEnabled === false ? 'selected' : ''}>关闭</option>
          </select>
          <span class="text-muted" style="font-size:11px;">关闭后用户无法充值</span>
        </div>
        <button class="btn btn-primary" onclick="saveConfig()">保存设置</button>
      </div>

      <!-- 抽奖说明 -->
      <div class="card mt-16">
        <div class="card-title">
          <span class="icon blue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </span>
          抽奖页说明
        </div>
        <div class="form-group">
          <label>说明文字（支持换行，将在抽奖页面顶部显示）</label>
          <textarea class="textarea" id="lotteryNotice" rows="3" placeholder="输入抽奖页说明...">${SL('lottery_notice', '')}</textarea>
        </div>
        <button class="btn btn-primary" onclick="saveLotteryNotice()">保存说明</button>
      </div>

      <!-- 抽奖倍率设置 -->
      <div class="card mt-16">
        <div class="card-title">
          <span class="icon orange">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/><path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/></svg>
          </span>
          抽奖概率设置
        </div>
        <p class="text-muted mb-8">调整每个奖品的权重（倍率），系统自动换算百分比。总权重越大，单个占比越低。</p>

        <div id="prizeEditor">
          ${prizeRows}
        </div>

        <div class="prize-total-row">
          <span>总权重: <span id="totalWeight">${totalWeight}</span></span>
          <span id="totalBadge" class="${totalWeight===100?'total-ok':'total-warn'}">
            ${totalWeight===100 ? '= 100%' : '= ' + totalWeight + ' (百分比总和)'}
          </span>
        </div>

        <div class="flex gap-8 mt-8">
          <button class="btn btn-primary" onclick="savePrizeConfig()">保存概率</button>
          <button class="btn btn-outline btn-sm" onclick="resetPrizeConfig()">恢复默认</button>
        </div>
      </div>

      <!-- 奖品兑换码 -->
      <div class="card mt-16">
        <div class="card-title">
          <span class="icon orange">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </span>
          奖品兑换码
          <span class="text-muted" style="font-weight:400;margin-left:8px;">抽奖中奖时自动匹配发放</span>
        </div>
        <div class="form-group">
          <label>奖品名称</label>
          <select class="input" id="prizeCodeName">
            ${prizes.filter(p=>p.name!=='谢谢参与').map(p=>`<option value="${p.name}">${p.name}（${p.points||0}分）</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>兑换码</label>
          <input type="text" class="input" id="prizeCodeValue" placeholder="输入兑换码">
        </div>
        <button class="btn btn-primary" onclick="addPrizeCode()">添加</button>
        <button class="btn btn-outline btn-sm" onclick="showBatchPrizeModal()" style="margin-left:8px;">批量添加</button>
        <div class="section-title mt-20">
          奖品兑换码列表
          <span class="text-muted" style="font-weight:400;margin-left:8px;" id="prizeCodesCount">${renderPrizeCodesCount()}</span>
        </div>
        <div id="prizeCodesList">${renderPrizeCodesList()}</div>
      </div>

      <!-- 自定义链接 -->
      <div class="card">
        <div class="card-title">
          <span class="icon blue">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </span>
          自定义链接
        </div>
        <div class="flex gap-8" style="align-items:flex-end;">
          <div class="form-group" style="margin-bottom:0;flex:1;">
            <label>按钮名称</label>
            <input type="text" class="input" id="linkName" placeholder="按钮显示名称">
          </div>
          <div class="form-group" style="margin-bottom:0;flex:2;">
            <label>链接地址</label>
            <input type="text" class="input" id="linkUrl" placeholder="https://...">
          </div>
          <button class="btn btn-primary" onclick="addCustomLink()">添加</button>
        </div>
        <div class="section-title mt-20">
          链接列表
          <span class="text-muted" style="font-weight:400;margin-left:8px;" id="linksCount">${renderLinksCount()}</span>
        </div>
        <div id="linksList">${renderLinksList()}</div>
      </div>

      </div><!-- /admin-grid -->

      <a href="index.html" class="btn btn-outline btn-sm back-btn" style="text-decoration:none;" title="返回首页">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </a>
    </div>
  `;
}


// ========== 操作函数 ==========
function saveConfig() {
  const config = getConfig();
  config.signinPoints = parseInt(document.getElementById('signinPoints').value) || 5;
  config.adminPassword = document.getElementById('adminPassword').value.trim() || 'admin123';
  config.rechargeEnabled = document.getElementById('rechargeEnabled')?.value !== '0';
  SS('config', config);
  toast('签到设置已保存', 'success');
}

function saveLotteryNotice() {
  const text = document.getElementById('lotteryNotice')?.value || '';
  SS('lottery_notice', text);
  toast('抽奖说明已保存', 'success');
}

function onWeightChange() {
  const inputs = document.querySelectorAll('.prize-weight-input');
  let total = 0;
  const weights = [];
  inputs.forEach(inp => {
    const w = parseInt(inp.value) || 0;
    weights.push(w);
    total += w;
  });
  document.getElementById('totalWeight').textContent = total;
  const badge = document.getElementById('totalBadge');
  if (total === 100) {
    badge.className = 'total-ok';
    badge.textContent = '= 100%';
  } else {
    badge.className = 'total-warn';
    badge.textContent = '= ' + total + ' (百分比总和)';
  }
  inputs.forEach((inp, i) => {
    const pct = total > 0 ? (weights[i] / total * 100) : 0;
    const el = document.getElementById('pct' + i);
    if (el) el.textContent = pct.toFixed(0) + '%';
  });
}

function savePrizeConfig() {
  const nameInputs = document.querySelectorAll('.prize-name-input');
  const weightInputs = document.querySelectorAll('.prize-weight-input');
  const prizes = getPrizeConfig();
  let total = 0;
  nameInputs.forEach((ni, i) => {
    const name = ni.value.trim();
    const weight = parseInt(weightInputs[i].value) || 0;
    prizes[i].name = name;
    prizes[i].weight = weight;
    prizes[i].id = i;
    // 从名称自动解析积分值
    let points = parseInt(name);
    if (isNaN(points)) points = 0;
    // 保留原有点数（当名称不含数字时）
    if (points === 0 && name !== '谢谢参与' && prizes[i].points && prizes[i].points > 0) {
      points = prizes[i].points;
    }
    prizes[i].points = points;
    total += weight;
  });
  if (total === 0) { toast('总权重不能为 0', 'error'); return; }
  SS('prize_config', prizes);
  toast('抽奖概率已保存（总权重 ' + total + '）', 'success');
  render();
}

function resetPrizeConfig() {
  SS('prize_config', JSON.parse(JSON.stringify(DEFAULT_PRIZES)));
  toast('已恢复默认概率', 'info');
  render();
}



// ========== 奖品兑换码管理 ==========
function getPrizeCodes() { return SL('prize_codes', []); }

function renderPrizeCodesCount() {
  const codes = getPrizeCodes().filter(c => !c.used);
  return `共 ${codes.length} 个可用`;
}

function renderPrizeCodesList() {
  const codes = getPrizeCodes().filter(c => !c.used);
  if (codes.length === 0) {
    return `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      <p>暂无奖品兑换码</p>
    </div>`;
  }

  // 按奖品名称分组
  const groups = {};
  codes.forEach(c => {
    if (!groups[c.prizeName]) groups[c.prizeName] = [];
    groups[c.prizeName].push(c);
  });

  const prizeConfig = getPrizeConfig();

  // 按奖品配置顺序排列
  const orderedNames = prizeConfig.map(p => p.name).filter(n => groups[n]);

  return orderedNames.map((name, gi) => {
    const list = groups[name];
    const canDelete = list.length > 0;
    return `
    <div class="prize-group">
      <div class="prize-group-header" onclick="togglePrizeGroup(${gi})" id="groupHeader${gi}">
        <span class="group-arrow">▶</span>
        <span class="group-info">
          <span class="group-name">${name}</span>
          <span class="group-count"><strong>${list.length}</strong> 张</span>
        </span>
      </div>
      <div class="prize-group-body" id="groupBody${gi}">
        ${list.map(c => {
          return `
          <div class="code-row">
            <span class="code-val-sm">${c.code}</span>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletePrizeCode('${c.code.replace(/'/g,"\\'")}')" style="padding:3px 8px;font-size:11px;min-width:auto;">删</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function togglePrizeGroup(gi) {
  const body = document.getElementById('groupBody' + gi);
  const header = document.getElementById('groupHeader' + gi);
  if (!body || !header) return;
  const isOpen = body.classList.contains('show');
  if (isOpen) {
    body.classList.remove('show');
    header.classList.remove('open');
  } else {
    body.classList.add('show');
    header.classList.add('open');
  }
}

function addPrizeCode() {
  const nameEl = document.getElementById('prizeCodeName');
  const valEl = document.getElementById('prizeCodeValue');
  const name = nameEl?.value;
  const code = valEl?.value?.trim();
  if (!code) { toast('请输入兑换码', 'error'); return; }
  const prizes = getPrizeConfig();
  const prize = prizes.find(p => p.name === name);
  const prizeCodes = getPrizeCodes();
  if (prizeCodes.some(c => c.code === code)) { toast('兑换码已存在', 'error'); return; }
  prizeCodes.push({
    code,
    prizeName: name,
    prizePoints: prize ? (prize.points || 0) : 0,
    used: false, usedBy: null, usedAt: null
  });
  SS('prize_codes', prizeCodes);
  valEl.value = '';
  toast(`已添加 ${name} 兑换码`, 'success');
  render();
}

function showBatchPrizeModal() {
  document.querySelector('.modal-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>批量添加奖品兑换码</h3>
      <p class="text-muted text-center mb-8">每行一个，格式: 兑换码,奖品名称</p>
      <textarea class="textarea" id="batchPrizeInput" rows="6" placeholder="ABC123,100积分&#10;XYZ789,50积分"></textarea>
      <div class="modal-actions mt-12">
        <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn btn-primary" onclick="doBatchAddPrize()">批量添加</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function doBatchAddPrize() {
  const text = document.getElementById('batchPrizeInput')?.value?.trim();
  if (!text) { toast('请输入兑换码', 'error'); return; }
  const lines = text.split('\n').filter(l => l.trim());
  const prizes = getPrizeConfig();
  const prizeCodes = getPrizeCodes();
  let added = 0;
  for (const line of lines) {
    const parts = line.split(',');
    const code = parts[0]?.trim();
    const pname = parts[1]?.trim();
    if (!code || !pname) continue;
    if (prizeCodes.some(c => c.code === code)) continue;
    const prize = prizes.find(p => p.name === pname);
    prizeCodes.push({
      code,
      prizeName: pname,
      prizePoints: prize ? (prize.points || 0) : 0,
      used: false, usedBy: null, usedAt: null
    });
    added++;
  }
  SS('prize_codes', prizeCodes);
  toast(`批量成功添加 ${added} 个兑换码`, 'success');
  document.querySelector('.modal-overlay')?.remove();
  render();
}

function deletePrizeCode(codeStr) {
  const codes = getPrizeCodes();
  const idx = codes.findIndex(c => c.code === codeStr);
  if (idx >= 0) codes.splice(idx, 1);
  SS('prize_codes', codes);
  toast('已删除', 'info');
  render();
}

// ========== 自定义链接管理 ==========
function getCustomLinks() { return SL('custom_links', []); }

function renderLinksCount() {
  const links = getCustomLinks();
  return `共 ${links.length} 个`;
}

function renderLinksList() {
  const links = getCustomLinks();
  if (links.length === 0) {
    return `<div class="empty-state"><p>暂无自定义链接</p></div>`;
  }
  return links.map((l, i) => `
    <div class="code-list-item">
      <span style="font-size:13px;font-weight:500;">${l.name}</span>
      <span style="font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;">${l.url}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteCustomLink(${i})" style="padding:3px 8px;font-size:11px;min-width:auto;">删</button>
    </div>
  `).join('');
}

function addCustomLink() {
  const name = document.getElementById('linkName')?.value?.trim();
  const url = document.getElementById('linkUrl')?.value?.trim();
  if (!name || !url) { toast('请填写名称和链接', 'error'); return; }
  const links = getCustomLinks();
  links.push({ name, url });
  SS('custom_links', links);
  document.getElementById('linkName').value = '';
  document.getElementById('linkUrl').value = '';
  toast(`已添加链接: ${name}`, 'success');
  render();
}

function deleteCustomLink(idx) {
  const links = getCustomLinks();
  links.splice(idx, 1);
  SS('custom_links', links);
  toast('已删除', 'info');
  render();
}

function doLogout() {
  localStorage.removeItem('sl_admin_session');
  state = 'login';
  render();
  toast('已退出', 'info');
}

// ========== 初始化 ==========
try {
  const session = SL('admin_session', null);
  if (session && (Date.now() - session.loggedAt < 3600000)) {
    state = 'admin';
  } else {
    localStorage.removeItem('sl_admin_session');
  }
  render();
} catch(e) {
  document.getElementById('app').innerHTML = '<div class="login-box"><div class="header"><h1>管理员后台</h1><p style="color:#ef4444;">页面加载出错：'+e.message+'</p></div><div class="card"><p class="text-muted">请尝试清除浏览器缓存后重试</p><a href="index.html" class="btn btn-outline btn-sm" style="text-decoration:none;">返回首页</a></div></div>';
}
</script>
