<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福利大厅</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-particles"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container home-view">
  <div class="header">
    <h1>福利大厅</h1>
    <p>签到领福利，抽奖赢好礼</p>
  </div>

  <!-- 积分 & 免费次数卡片 -->
  <div class="card" style="text-align:center;">
    <div class="stats-row" style="margin-bottom:0;">
      <div class="stat-item" style="border:none;">
        <div class="stat-value" style="color:var(--warning);" id="freeDraws">-</div>
        <div class="stat-label">免费抽奖次数</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">
      签到状态：<span id="signinStatus" style="font-size:11px;padding:1px 8px;border-radius:10px;">加载中...</span>
      &middot; 累计签到 <span id="signCount" style="color:var(--text);font-weight:600;">-</span> 天
    </div>
  </div>

  <!-- 功能导航 -->
  <div class="nav-grid">
    <div class="nav-card" onclick="doSignin()" id="signinCard" style="cursor:pointer;">
      <div class="nav-icon" style="background:rgba(99,102,241,.15);color:var(--primary-light);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <div class="nav-label" id="signinLabel">签到</div>
      <div class="nav-desc" id="signinDesc">签到领积分 + 免费抽奖</div>
    </div>
    <a href="lottery.html" class="nav-card">
      <div class="nav-icon" style="background:rgba(245,158,11,.15);color:var(--warning);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/><path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/></svg>
      </div>
      <div class="nav-label">抽奖</div>
      <div class="nav-desc">转盘赢积分</div>
    </a>
  </div>

  <!-- 签到历史 -->
  <div class="card mt-20" id="historyCard">
    <div class="card-title">
      <span class="icon purple">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </span>
      签到记录
    </div>
    <div id="historyList" style="max-height:200px;overflow-y:auto;">
      <p class="text-muted text-center">加载中...</p>
    </div>
  </div>

  <!-- 自定义链接 -->
  <div id="customLinksCard" style="margin-bottom:12px;">
    <div class="card" style="padding:12px 14px;margin:0;">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary-light);">快捷入口</div>
      <div id="customLinksList" class="flex flex-wrap gap-6">
        <p class="text-muted" style="font-size:12px;">暂无快捷入口</p>
      </div>
    </div>
  </div>

</div>

<div style="text-align:center;padding:0 0 40px;">
  <a href="admin.html" class="btn btn-outline btn-sm">管理员入口</a>
</div>

<script src="api-client.js"></script>
<script>
// ========== 设备指纹 ==========
function getFingerprint() {
  const parts = [
    navigator.platform || '',
    screen.width + 'x' + screen.height + 'x' + screen.colorDepth,
    new Date().getTimezoneOffset(),
    navigator.hardwareConcurrency || 0,
    navigator.language || ''
  ];
  return 'fp_' + btoa(parts.join('|')).slice(0, 24).replace(/[^a-zA-Z0-9]/g,'');
}

const userId = getFingerprint();

// ========== UI 工具 ==========
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2500);
}

function todayStr() { return new Date().toISOString().slice(0,10); }

// ========== 签到逻辑 ==========
async function doSignin() {
  const btn = document.getElementById('signinCard');
  if (btn.classList.contains('loading')) return;
  btn.classList.add('loading');
  btn.style.opacity = '0.6';

  try {
    const result = await API.signin(userId);
    // 构建签到成功提示信息
    let msg = `签到成功！+${result.earnedPoints} 积分 + 免费抽奖`;
    if (result.signPrizeCode) {
      msg += ` | 🎁 兑换码: ${result.signPrizeCode.code}（${result.signPrizeCode.prizeName}）`;
    }
    toast(msg, 'success');
    await loadData();
  } catch (e) {
    toast(e.message || '签到失败', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.style.opacity = '';
  }
}

// ========== 更新显示 ==========
async function loadData() {
  try {
    const [signins, freeDraws, signed, config] = await Promise.all([
      API.getSignins(userId),
      API.getFreeDraws(userId),
      API.getSigninToday(userId),
      API.getConfig()
    ]);

    // 更新免费抽奖次数
    document.getElementById('freeDraws').textContent = freeDraws;

    // 累积签到天数
    document.getElementById('signCount').textContent = signins.length;

    // 签到状态
    const statusEl = document.getElementById('signinStatus');
    if (signed) {
      statusEl.textContent = '已签到';
      statusEl.style.cssText = 'background:rgba(34,197,94,.12);color:#22c55e;';
      document.getElementById('signinLabel').textContent = '已签到';
      document.getElementById('signinDesc').textContent = '明天再来';
      document.getElementById('signinCard').style.opacity = '0.6';
    } else {
      statusEl.textContent = '未签到';
      statusEl.style.cssText = 'background:rgba(239,68,68,.1);color:#ef4444;';
      document.getElementById('signinLabel').textContent = '签到';
      document.getElementById('signinDesc').textContent = '签到领积分 + 免费抽奖';
      document.getElementById('signinCard').style.opacity = '1';
    }

    // 今日签到记录
    const container = document.getElementById('historyList');
    const todayRecords = signins.filter(h => h.sign_date === todayStr());
    if (todayRecords.length === 0) {
      container.innerHTML = '<p class="text-muted text-center">今日暂无签到记录</p>';
    } else {
      container.innerHTML = todayRecords.slice().reverse().map(h => `
        <div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:13px;">${new Date(h.signed_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</span>
            <span><span class="badge badge-success">+${h.points_earned}额度</span></span>
          </div>
        </div>
      `).join('');
    }
  } catch (e) {
    console.error('加载数据失败:', e);
    toast('数据加载失败，请检查网络连接', 'error');
  }
}

// ========== 自定义链接渲染 ==========
async function renderCustomLinks() {
  try {
    const links = await API.getLinks();
    const container = document.getElementById('customLinksList');
    const card = document.getElementById('customLinksCard');
    if (links.length === 0) {
      if (card) card.classList.add('hidden');
      return;
    }
    if (card) card.classList.remove('hidden');
    container.innerHTML = links.map(l => `
      <a href="${l.url}" target="_blank" class="btn btn-outline btn-sm" style="text-decoration:none;padding:4px 10px;font-size:12px;">${l.name}</a>
    `).join('');
  } catch (e) {
    console.error('加载链接失败:', e);
  }
}

// ========== 初始化 ==========
(async function init() {
  try {
    // 确保用户存在
    await API.ensureUser(userId);
    // 加载所有数据
    await Promise.all([
      loadData(),
      renderCustomLinks()
    ]);
  } catch (e) {
    console.error('初始化失败:', e);
    toast('初始化失败，请检查网络连接', 'error');
  }
})();
</script>
</body>
</html>
