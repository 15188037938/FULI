<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福利大厅</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="db.js"></script>
</head>
<body>
<div class="bg-particles"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container home-view">
  <div class="header">
    <h1>福利大厅</h1>
    <p>签到领福利，抽奖赢好礼</p>
  </div>

  <div class="card" style="text-align:center;">
    <div class="stats-row" style="margin-bottom:0;">
      <div class="stat-item" style="border:none;">
        <div class="stat-value" style="color:var(--warning);" id="freeDraws">0</div>
        <div class="stat-label">免费抽奖次数</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">
      签到状态：<span id="signinStatus" style="font-size:11px;padding:1px 8px;border-radius:10px;">未签到</span>
      &middot; 累计签到 <span id="signCount" style="color:var(--text);font-weight:600;">0</span> 天
    </div>
  </div>

  <div class="nav-grid">
    <div class="nav-card" onclick="doSignin()" id="signinCard" style="cursor:pointer;">
      <div class="nav-icon" style="background:rgba(99,102,241,.15);color:var(--primary-light);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <div class="nav-label" id="signinLabel">签到</div>
      <div class="nav-desc" id="signinDesc">签到领福利</div>
    </div>
    <a href="lottery.html" class="nav-card">
      <div class="nav-icon" style="background:rgba(245,158,11,.15);color:var(--warning);">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/><path d="M12 2a15.3 15.3 0 0 0-4 10 15.3 15.3 0 0 0 4 10"/></svg>
      </div>
      <div class="nav-label">抽奖</div>
      <div class="nav-desc">转盘赢积分</div>
    </a>
  </div>

  <div class="card mt-20" id="historyCard">
    <div class="card-title">
      <span class="icon purple">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </span>
      签到记录
    </div>
    <div id="historyList" style="max-height:200px;overflow-y:auto;">
      <p class="text-muted text-center">暂无签到记录</p>
    </div>
  </div>

  <div id="customLinksCard" style="position:fixed;top:16px;right:16px;z-index:50;max-width:300px;">
    <div class="card" style="padding:12px 14px;margin:0;">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary-light);">快捷入口</div>
      <div id="customLinksList" class="flex flex-wrap gap-6">
        <p class="text-muted" style="font-size:12px;">暂无快捷入口</p>
      </div>
    </div>
  </div>

</div>

<div style="text-align:center;padding:0 0 40px;">
  <a href="admin.html" class="btn btn-outline btn-sm">管理员入口</a>
</div>

<script>
const FINGERPRINT = (() => {
  const p = [navigator.platform||'', screen.width+'x'+screen.height+'x'+screen.colorDepth, new Date().getTimezoneOffset(), navigator.hardwareConcurrency||0, navigator.language||''];
  return 'fp_' + btoa(p.join('|')).slice(0,24).replace(/[^a-zA-Z0-9]/g,'');
})();

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2500);
}

function todayStr() { return new Date().toISOString().slice(0,10); }

// ========== 签到 ==========
async function doSignin() {
  const config = await DB.getConfig();
  const existing = await DB.getSigninToday(FINGERPRINT);
  if (existing) { toast('今天已经签到过了', 'info'); return; }

  const available = await DB.getAvailablePrizeCode('1积分');
  if (!available) { toast('兑换码耗尽，请联系管理员补发，QQ：9200563', 'error'); return; }

  await DB.usePrizeCode(available.id, FINGERPRINT);
  await DB.addSignin(FINGERPRINT, config.signinPoints, available.code);

  const pts = await DB.getUserPoints(FINGERPRINT);
  await DB.updateUserPoints(FINGERPRINT, pts.balance, (pts.free_draws || 0) + 1);

  showCodeModal(available.code, config.signinPoints);
  updateStats();
  renderHistory();
  updateSigninCard();
}

function showCodeModal(code, points) {
  document.querySelector('.modal-overlay')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal"><h3>签到成功</h3><div class="code-display"><div class="code-text">${code}</div><div class="code-meta">面值 ${points} 积分</div></div><p class="text-muted text-center" style="margin-top:8px;">兑换码已发放 + 免费抽奖次数 +1</p><div class="modal-actions"><button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">知道了</button><button class="btn btn-outline btn-sm" onclick="copyCode('${code}')">复制兑换码</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

function copyCode(code) { navigator.clipboard.writeText(code).then(() => toast('已复制兑换码', 'success')); }

// ========== 更新显示 ==========
async function updateStats() {
  const pts = await DB.getUserPoints(FINGERPRINT);
  const signins = await DB.getSigninsToday(FINGERPRINT);
  document.getElementById('freeDraws').textContent = pts.free_draws || 0;
  document.getElementById('signCount').textContent = signins.length;
}

async function renderHistory() {
  const signins = await DB.getSigninsToday(FINGERPRINT);
  const container = document.getElementById('historyList');
  if (signins.length === 0) { container.innerHTML = '<p class="text-muted text-center">今日暂无签到记录</p>'; return; }
  container.innerHTML = signins.map(h => `<div style="padding:8px 0;border-bottom:1px solid var(--border);"><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;">${new Date(h.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</span><span><span class="badge badge-success">+${h.points}额度</span></span></div>${h.code ? `<div style="font-size:11px;color:var(--primary-light);font-family:monospace;margin-top:4px;">${h.code}</div>` : ''}</div>`).join('');
}

async function updateSigninCard() {
  const existing = await DB.getSigninToday(FINGERPRINT);
  const el = document.getElementById('signinStatus');
  if (existing) {
    document.getElementById('signinLabel').textContent = '已签到';
    document.getElementById('signinDesc').textContent = '明天再来';
    document.getElementById('signinCard').style.opacity = '0.6';
    if (el) { el.textContent = '已签到'; el.style.cssText = 'background:rgba(34,197,94,.12);color:#22c55e;'; }
  } else {
    if (el) { el.textContent = '未签到'; el.style.cssText = 'background:rgba(239,68,68,.1);color:#ef4444;'; }
  }
}

// ========== 自定义链接 ==========
async function renderCustomLinks() {
  const links = await DB.getCustomLinks();
  const container = document.getElementById('customLinksList');
  const card = document.getElementById('customLinksCard');
  if (links.length === 0) { if (card) card.classList.add('hidden'); return; }
  if (card) card.classList.remove('hidden');
  container.innerHTML = links.map(l => `<a href="${l.url}" target="_blank" class="btn btn-outline btn-sm" style="text-decoration:none;padding:4px 10px;font-size:12px;">${l.name}</a>`).join('');
}

// ========== 初始化 ==========
(async function init() {
  updateStats();
  renderHistory();
  updateSigninCard();
  renderCustomLinks();
})();
</script>
</body>
</html>
