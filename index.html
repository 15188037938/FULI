<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>福利大厅</title><link rel="stylesheet" href="style.css"></head><body>
<div class="bg-particles"></div><div class="toast-container" id="toastContainer"></div>
<div class="container home-view"><div class="header"><h1>福利大厅</h1><p>签到领福利，抽奖赢好礼</p></div>
<div class="card" style="text-align:center"><div class="stats-row" style="margin-bottom:0"><div class="stat-item" style="border:none"><div class="stat-value" style="color:var(--warning)" id="freeDraws">0</div><div class="stat-label">免费抽奖次数</div></div></div>
<div style="font-size:12px;color:var(--text-muted);margin-top:4px">签到状态：<span id="signinStatus" style="font-size:11px;padding:1px 8px;border-radius:10px">加载中</span> &middot; 累计签到 <span id="signCount" style="color:var(--text);font-weight:600">0</span> 天</div></div>
<div class="nav-grid"><div class="nav-card" onclick="doSignin()" id="signinCard" style="cursor:pointer"><div class="nav-icon" style="background:rgba(99,102,241,.15);color:var(--primary-light)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></div><div class="nav-label" id="signinLabel">签到</div><div class="nav-desc">签到领福利</div></div>
<a href="lottery.html" class="nav-card"><div class="nav-icon" style="background:rgba(245,158,11,.15);color:var(--warning)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20"/><path d="M12 2a10 10 0 0 0 4 10"/><path d="M12 2a10 10 0 0 0-4 10"/></svg></div><div class="nav-label">抽奖</div><div class="nav-desc">转盘赢积分</div></a></div>
<div class="card mt-20" id="historyCard"><div class="card-title"><span class="icon purple"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>签到记录</div><div id="historyList" style="max-height:200px;overflow-y:auto"><p class="text-muted text-center">暂无签到记录</p></div></div>
<div id="customLinksCard"><div class="card" style="padding:12px 14px;margin:0"><div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary-light)">快捷入口</div><div id="customLinksList" class="flex flex-wrap gap-6"><p class="text-muted" style="font-size:12px">暂无快捷入口</p></div></div></div>
</div><div style="text-align:center;padding:0 0 40px"><a href="admin.html" class="btn btn-outline btn-sm">管理员入口</a></div>

<script src="api-client.js"></script>
<script>
const FP = (()=>{const p=[navigator.platform||'',screen.width+'x'+screen.height+'x'+screen.colorDepth,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,navigator.language||''];return'fp_'+btoa(p.join('|')).slice(0,24).replace(/[^a-zA-Z0-9]/g,'');})();
let config={signinPoints:5};

function toast(m,t='info'){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toastContainer').appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2500)}

async function doSignin(){
  const result=await API.signin(FP,config.signinPoints);
  if(!result.ok){toast(result.error==='兑换码耗尽'?'兑换码耗尽，请联系管理员补发，QQ：9200563':'今天已经签到过了','error');return}
  showCodeModal(result.code,result.points);refresh();
}

function showCodeModal(c,p){document.querySelector('.modal-overlay')?.remove();const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal"><h3>签到成功</h3><div class="code-display"><div class="code-text">${c}</div><div class="code-meta">面值 ${p} 积分</div></div><p class="text-muted text-center" style="margin-top:8px">+免费抽奖次数 +1</p><div class="modal-actions"><button class="btn btn-primary" onclick="this.closest('.modal-overlay').remove()">知道了</button><button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${c}').then(()=>toast('已复制','success'))">复制</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()})}

async function refresh(){const[s,p,l]=await Promise.all([API.getSignins(FP),API.getPoints(FP),API.getLinks()]);document.getElementById('freeDraws').textContent=p.free_draws||0;document.getElementById('signCount').textContent=s.length;
const h=document.getElementById('historyList');h.innerHTML=s.length?s.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px">${new Date(r.time).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</span><span><span class="badge badge-success">+${r.points}额度</span></span></div><div style="font-size:11px;color:var(--primary-light);font-family:monospace;margin-top:4px">${r.code}</div></div>`).join(''):'<p class="text-muted text-center">今日暂无签到记录</p>';
const st=document.getElementById('signinStatus'),today=await API.getSigninToday(FP);if(today){st.textContent='已签到';st.style.cssText='background:rgba(34,197,94,.12);color:#22c55e';document.getElementById('signinLabel').textContent='已签到';document.getElementById('signinCard').style.opacity='0.6'}else{st.textContent='未签到';st.style.cssText='background:rgba(239,68,68,.1);color:#ef4444'}
const lc=document.getElementById('customLinksCard');if(l.length){lc.innerHTML=`<div class="card" style="padding:12px 14px;margin:0;position:fixed;top:16px;right:16px;z-index:50;max-width:300px"><div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--primary-light)">快捷入口</div><div class="flex flex-wrap gap-6">${l.map(x=>`<a href="${x.url}" target="_blank" class="btn btn-outline btn-sm" style="text-decoration:none;padding:4px 10px;font-size:12px">${x.name}</a>`).join('')}</div></div>`}else{lc.classList.add('hidden')}}

(async function init(){config=await API.getConfig();refresh()})()
</script></body></html>
